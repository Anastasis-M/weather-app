<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0a0a0b" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Weather" />
        <meta
            name="description"
            content="A simple, fast weather app — hourly, 7-day, and details. Powered by Open-Meteo."
        />
        <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="%sveltekit.assets%/icon.svg"
        />
        <link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
        <link rel="preconnect" href="https://api.open-meteo.com" />
        <link rel="preconnect" href="https://geocoding-api.open-meteo.com" />

        <title>Weather</title>
        %sveltekit.head%
    </head>
    <body class="bg-bg text-ink antialiased min-h-screen">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
